<style>
  .xftv0-checkbox-chip {
    display: inline-flex;
    align-items: center;

    border-radius: 999px;
    border: 1px solid var(--color-divider-neutral);
    background: var(--color-container-bg-neutral-lightgray);
    color: var(--color-text-neutral-gray50);
    cursor: pointer;
  }

      </div>
      <div class="xftv0-tag-row">
        <!-- target_tags -->
      </div>
    </div>

      <span class="xftv0-inline-note">仅支持轻交互原型展示，不承载真实业务校验。</span>
