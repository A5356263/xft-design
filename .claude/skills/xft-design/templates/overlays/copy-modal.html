<section class="xftv0-overlay" id="copy-modal" data-overlay aria-hidden="true" hidden data-template-id="overlay.copy-modal">
  <div class="xftv0-overlay-card">
    <header class="xftv0-overlay-head">
      <h2 class="xftv0-overlay-title">{{overlay_title}}</h2>
      <button class="xftv0-button xftv0-button-subtle" type="button" data-overlay-close>关闭</button>
    </header>
    <div class="xftv0-overlay-body">
      <div class="xftv0-inline-note">{{source_text}}</div>
      <div class="xftv0-checkbox-group">
        <!-- copy_options -->
      </div>
      <div class="xftv0-tag-row">
        <!-- target_tags -->
      </div>
    </div>
    <footer class="xftv0-overlay-foot">
      <span class="xftv0-inline-note">仅支持轻交互原型展示，不承载真实业务校验。</span>
      <div class="xftv0-button-row">
        <!-- overlay_actions -->
      </div>
    </footer>
  </div>
</section>
