<section class="xftv0-overlay overlay-mask" id="result-modal" data-overlay aria-hidden="true" hidden data-template-id="overlay.result-modal">
  <div class="xftv0-overlay-card modal">
    <header class="xftv0-overlay-head overlay-header">
      <h2 class="xftv0-overlay-title overlay-title">{{overlay_title}}</h2>
      <button class="xftv0-button xftv0-button-subtle btn btn-text" type="button" data-overlay-close>关闭</button>
    </header>
    <div class="xftv0-overlay-body overlay-body">
      <!-- result_panel_slot -->
    </div>
    <footer class="xftv0-overlay-foot overlay-footer">
      <span class="xftv0-inline-note">{{result_footer_note}}</span>
      <div class="xftv0-button-row">
        <button class="xftv0-button xftv0-button-primary btn btn-primary" type="button" data-overlay-close>知道了</button>
      </div>
    </footer>
  </div>
</section>
