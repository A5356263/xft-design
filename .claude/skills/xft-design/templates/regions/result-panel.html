<style>
  .xftv0-result-panel {
    padding: var(--spacing-5);
    border-radius: var(--border-radius-large);
    background: var(--color-container-bg-neutral-lightgray);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .xftv0-result-summary {
    display: flex;
    align-items: center;
    gap: var(--spacing-3);
    color: var(--color-text-neutral-gray50);
    font-size: 16px;
    line-height: 24px;
    font-weight: 600;
  }

  .xftv0-result-group {
    flex: 1 1 0;
    min-width: 180px;
    padding: var(--spacing-4);
    border: 1px solid var(--color-divider-neutral);
    border-radius: var(--border-radius-large);
    background: var(--color-container-bg-neutral-bright);
  }

  .xftv0-result-group-title {
    margin: 0 0 var(--spacing-2);
    font-size: 14px;
    line-height: 22px;
    font-weight: 600;
  }

  .xftv0-result-list {
    margin: 0;
    padding-left: var(--spacing-5);
    color: var(--color-text-neutral-gray40);
  }

  .xftv0-result-list li + li {
    margin-top: var(--spacing-2);
  }
</style>

<div class="xftv0-result-panel" data-template-id="region.result-panel">
  <div class="xftv0-result-summary">
    <span class="xftv0-icon icon icon-md">{{result_icon}}</span>
    <span>{{result_summary}}</span>
  </div>
  <div class="xftv0-result-groups">
    <!-- result_groups -->
  </div>
</div>
