<style>
  .xftv0-action-region {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--spacing-4);
    min-height: 40px;
  }

  .xftv0-action-region-group {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 40px;
  }

  .xftv0-action-region-batch {
    flex: 1 1 auto;
    justify-content: center;
  }

  .xftv0-action-region-utility {
    justify-content: flex-end;
  }

  .xftv0-action-region-status {
    color: var(--color-text-neutral-gray40);
    font-size: 13px;
    line-height: 20px;
    font-weight: 500;
  }

  @media (max-width: 1200px) {
    .xftv0-action-region {
      flex-direction: column;
      align-items: stretch;
    }

    .xftv0-action-region-group,
    .xftv0-action-region-batch,
    .xftv0-action-region-utility {
      justify-content: flex-start;
    }
  }

<div class="xftv0-action-region" data-template-id="region.action-bar">
  <div class="xftv0-action-region-group xftv0-action-region-primary" data-slot="primary_group_slot">
    <button class="xftv0-button xftv0-button-primary" type="button">新增</button>
    <button class="xftv0-button" type="button">导出</button>
  </div>
  <div class="xftv0-action-region-group xftv0-action-region-batch" data-slot="batch_group_slot">

    <div class="xftv0-button-row">
      <button class="xftv0-button xftv0-button-subtle" type="button">批量导出</button>
    </div>
  </div>
  <div class="xftv0-action-region-group xftv0-action-region-utility" data-slot="utility_group_slot">
    <button class="xftv0-button xftv0-button-subtle" type="button">刷新</button>
    <button class="xftv0-button xftv0-button-subtle" type="button">列设置</button>
  </div>
</div>
