<style>
  .xftv0-filter-region {
    --xftv0-filter-label-width: 64px;
    display: flex;
    flex-direction: column;
    gap: var(--spacing-6, 24px);
  }

  .xftv0-filter-region-base,
  .xftv0-filter-region-expanded-panel {
    display: flex;
    align-items: flex-start;
    gap: var(--spacing-6, 24px);
  }

  .xftv0-filter-region-base-fields {
    flex: 1 1 auto;
    min-width: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--spacing-6, 24px);
    row-gap: 16px;
  }

  .xftv0-filter-region-expanded-fields {
    flex: 1 1 auto;
    min-width: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--spacing-6, 24px);
    row-gap: 16px;
  }

  .xftv0-filter-region-base-actions,
  .xftv0-filter-region-expanded-actions {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: var(--spacing-3, 12px);
    min-width: max-content;
  }

  .xftv0-filter-region-field-item {
    display: flex;
    align-items: center;
    gap: var(--spacing-2, 8px);
    min-width: 0;
  }

  .xftv0-filter-region-field-label {
    flex: 0 0 var(--xftv0-filter-label-width);
    width: var(--xftv0-filter-label-width);
    color: var(--color-text-neutral-gray50, rgba(19, 34, 64, 0.95));
    font-size: var(--font-size-large, 16px);
    line-height: 24px;
    font-weight: var(--font-weight-bold, 600);
    white-space: nowrap;
    text-align: right;
  }

  .xftv0-filter-region-field-control {
    flex: 1 1 auto;
    min-width: 0;
  }

  .xftv0-filter-region-field-control .xftv0-input,
  .xftv0-filter-region-field-control .xftv0-select {
    width: 100%;
  }

  .xftv0-filter-region-quick {
    display: flex;
    flex-wrap: wrap;
    gap: var(--spacing-3, 12px);
  }

  .xftv0-filter-region-expanded-panel[hidden] {
    display: none !important;
  }

  .xftv0-filter-region-toggle-button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 40px;
    padding: 0;
    border: 0;
    background: transparent;
    color: var(--color-text-accent-regular, #1966ff);
    font-size: var(--font-size-large, 16px);
    line-height: 24px;
    font-weight: var(--font-weight-bold, 600);
    cursor: pointer;
  }

  .xftv0-filter-region-toggle-button .xftv0-filter-region-toggle-expanded {
    display: none;
  }

  .xftv0-filter-region-toggle-button[aria-expanded="true"] .xftv0-filter-region-toggle-collapsed {
    display: none;
  }

  .xftv0-filter-region-toggle-button[aria-expanded="true"] .xftv0-filter-region-toggle-expanded {
    display: inline;
  }

  .xftv0-filter-region-toggle-arrow {
    transition: transform var(--motion-fast, 150ms) var(--ease-standard, cubic-bezier(0.2, 0, 0, 1));
  }

  .xftv0-filter-region-toggle-button[aria-expanded="true"] .xftv0-filter-region-toggle-arrow {
    transform: rotate(180deg);
  }

  .xftv0-filter-region:has(.xftv0-filter-region-toggle-button[aria-expanded="true"]) .xftv0-filter-region-base-actions {
    display: none;
  }

  @media (max-width: 1280px) {
    .xftv0-filter-region-base,
    .xftv0-filter-region-expanded-panel {
      flex-direction: column;
      align-items: stretch;
    }

    .xftv0-filter-region-base-fields,
    .xftv0-filter-region-expanded-fields {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .xftv0-filter-region-base-actions,
    .xftv0-filter-region-expanded-actions {
      justify-content: flex-end;
    }
  }

  @media (max-width: 768px) {
    .xftv0-filter-region-base-fields,
    .xftv0-filter-region-expanded-fields {
      grid-template-columns: minmax(0, 1fr);
    }
  }
</style>

<div class="xftv0-filter-region" data-template-id="region.filter-bar" style="{{filter_region_style}}">
  <div class="xftv0-filter-region-base">
    <section class="xftv0-filter-region-base-fields" data-slot="base_fields_slot">
      <div class="xftv0-filter-region-field-item">
        <span class="xftv0-filter-region-field-label">姓名</span>
        <div class="xftv0-filter-region-field-control">
          <input class="xftv0-input" type="text" placeholder="请输入姓名" />
        </div>
      </div>
      <div class="xftv0-filter-region-field-item">
        <span class="xftv0-filter-region-field-label">手机号</span>
        <div class="xftv0-filter-region-field-control">
          <input class="xftv0-input" type="text" placeholder="请输入手机号" />
        </div>
      </div>
    </section>
    <nav class="xftv0-filter-region-base-actions" data-slot="actions_slot">
      <button class="xftv0-button" type="button">重置</button>
      <button class="xftv0-button xftv0-button-primary" type="button">查询</button>
      <button class="xftv0-filter-region-toggle-button" type="button" data-collapse-toggle="{{advanced_panel_id}}" aria-expanded="false">
        <span class="xftv0-filter-region-toggle-collapsed">更多筛选</span>
        <span class="xftv0-filter-region-toggle-expanded">收起筛选</span>
        <span class="xftv0-filter-region-toggle-arrow">▼</span>
      </button>
    </nav>
  </div>

  <aside class="xftv0-filter-region-quick" data-slot="quick_filters">
    <button class="xftv0-chip" type="button">全部</button>
    <button class="xftv0-chip" type="button">待处理</button>
  </aside>

  <div class="xftv0-filter-region-expanded-panel" id="{{advanced_panel_id}}" data-slot="advanced_panel_slot" hidden>
    <section class="xftv0-filter-region-expanded-fields" data-slot="expanded_fields_slot">
      <div class="xftv0-filter-region-field-item">
        <span class="xftv0-filter-region-field-label">部门</span>
        <div class="xftv0-filter-region-field-control">
          <select class="xftv0-select">
            <option>请选择部门</option>
          </select>
        </div>
      </div>
      <div class="xftv0-filter-region-field-item">
        <span class="xftv0-filter-region-field-label">状态</span>
        <div class="xftv0-filter-region-field-control">
          <select class="xftv0-select">
            <option>请选择状态</option>
          </select>
        </div>
      </div>
      <div class="xftv0-filter-region-field-item">
        <span class="xftv0-filter-region-field-label">创建时间</span>
        <div class="xftv0-filter-region-field-control">
          <input class="xftv0-input" type="text" placeholder="请选择时间范围" />
        </div>
      </div>
      <div class="xftv0-filter-region-field-item">
        <span class="xftv0-filter-region-field-label">成员归属</span>
        <div class="xftv0-filter-region-field-control">
          <select class="xftv0-select">
            <option>请选择成员</option>
          </select>
        </div>
      </div>
    </section>
    <nav class="xftv0-filter-region-expanded-actions" data-slot="expanded_actions_slot">
      <button class="xftv0-button" type="button">重置</button>
      <button class="xftv0-button xftv0-button-primary" type="button">查询</button>
      <button class="xftv0-filter-region-toggle-button" type="button" data-collapse-toggle="{{advanced_panel_id}}" aria-expanded="false">
        <span class="xftv0-filter-region-toggle-collapsed">更多筛选</span>
        <span class="xftv0-filter-region-toggle-expanded">收起筛选</span>
        <span class="xftv0-filter-region-toggle-arrow">▼</span>
      </button>
    </nav>
  </div>
</div>
