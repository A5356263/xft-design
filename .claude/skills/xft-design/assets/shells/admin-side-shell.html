<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise Admin Side Shell</title>
  <style>
    /* Shell local variables: layout sizes and shell-only brand gradient. Not design tokens. */
    :root {
      --color-nav-gradient-start: #3C8AFF;
      --color-nav-gradient-end: #4255FF;
      --color-nav-text: #FFFFFF;

      --top-nav-height: 48px;
      --top-brand-width: 160px;
      --side-nav-width: 188px;
      --side-nav-item-width: 172px;
      --side-nav-item-height: 40px;
      --web-tabs-height: 32px;
      --web-tab-item-height: 32px;
      --page-padding: var(--spacing-4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--color-text-neutral-gray50);
      background: var(--color-layout-bg-neutral-gray);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        Arial,
        sans-serif;
      font-size: 14px;
      line-height: 22px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      background: var(--color-layout-bg-neutral-gray);
      position: relative;
    }

    .top-nav {
      height: var(--top-nav-height);
      display: flex;
      align-items: center;
      padding: 0;
      background: linear-gradient(117.84deg, var(--color-nav-gradient-start), var(--color-nav-gradient-end));
      position: sticky;
      top: 0;
      z-index: 20;
    }

    /* Nav layout */
    .nav-left {
      display: flex;
      align-items: center;
      flex: 1 1;
      padding-left: 14px;
      width: 0;
      min-width: 0;
      overflow: hidden;
    }

    .nav-left-content {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
    }

    .nav-center {
      height: 100%;
      padding-right: 48px;
      flex: 0 0 auto;
    }

    .nav-right {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      height: 100%;
      padding-right: 12px;
    }

    .nav-right-content {
      display: flex;
      align-items: center;
    }

    /* Product title */
    .product-title {
      flex: 0 0 auto;
      padding: 0 16px 0 6px;
      color: rgba(249, 249, 250, 0.98);
      font-size: 22px;
      line-height: 26px;
      font-family: 'Alimama_ShuHeiTi_Bold', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-weight: 400;
      white-space: nowrap;
    }

    /* Enterprise tenant switch */
    .nav-item-wrap {
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
    }

    .nav-item-wrap:hover {
      background: rgba(249, 249, 250, 0.1);
    }

    .nav-item-wrap.with-padding {
      padding: 4px 8px 4px 6px;
    }

    .nav-item-wrap-search {
      padding: 0 4px;
    }

    .nav-item-wrap-user {
      padding: 2px 8px;
    }

    .enterprise-box {
      display: flex;
      align-items: center;
    }

    .enterprise-icon {
      color: #fff;
      padding: 0 4px 0 2px;
      display: flex;
      align-items: center;
    }

    .enterprise-name {
      color: rgba(249, 249, 250, 0.98);
      font-size: 14px;
      height: 22px;
      max-width: 222px;
      padding-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-caret {
      color: #fff;
      margin-left: 4px;
      display: flex;
      align-items: center;
      flex: 0 0 auto;
    }

    /* App nav divider (pseudo via container) */
    .nav-app-wrap {
      display: flex;
      align-items: center;
      flex: 1 1;
      overflow: hidden;
      width: 0;
    }

    .nav-divider-pseudo {
      background: rgba(255, 255, 255, 0.2);
      height: 18px;
      width: 1px;
      flex: 0 0 1px;
      margin-left: 8px;
    }

    /* App nav */
    .xft-app-nav {
      display: flex;
      align-items: center;
      height: 48px;
      padding: 4px;
    }

    .app-nav {
      display: flex;
      align-items: center;
    }

    .nav-app {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      font-size: 14px;
      height: 40px;
      padding: 0 12px;
      position: relative;
      transition: all 0.15s ease;
      flex: 0 0 auto;
      white-space: nowrap;
      line-height: 22px;
    }

    .nav-app-content {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-app-active {
      background: #fff;
      height: 0;
      left: 0;
      margin: 0 12px;
      position: absolute;
      top: 38px;
      width: calc(100% - 24px);
    }

    .nav-app.is-active {
      font-weight: 600;
    }

    .nav-app.is-active .nav-app-active {
      height: 2px;
    }

    .top-menu-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      color: currentColor;
    }

    /* All-app entry (after nav) */
    .all-app-entry {
      display: flex;
      align-items: center;
      padding: 0 10px 0 8px;
    }

    .all-app-container {
      display: flex;
      align-items: center;
      color: rgba(249, 249, 250, 0.98);
      font-size: 14px;
      gap: 4px;
    }

    .all-app-icon {
      color: rgba(249, 249, 250, 0.98);
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
    }

    /* Global search */
    .global-search {
      width: 240px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.5);
      border: none;
      flex: 0 0 auto;
    }

    .global-search:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .global-search svg {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .global-search span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      flex: 1;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Right nav icons */
    .nav-tool {
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
    }

    .nav-tool:hover {
      background: rgba(249, 249, 250, 0.1);
    }

    .top-nav-icon {
      width: 24px;
      height: 24px;
      color: rgba(249, 249, 250, 0.98);
      display: block;
    }

    /* Divider in right section */
    .nav-divider-vertical {
      background: rgba(249, 249, 250, 0.14);
      border-radius: 1px;
      height: 16px;
      width: 1px;
      flex: 0 0 1px;
      margin: 0 4px;
    }

    /* User avatar */
    .user-avatar-wrap {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .user-logo-box {
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      height: 28px;
      width: 28px;
      position: relative;
      overflow: hidden;
      flex: 0 0 28px;
    }

    .user-logo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1966ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
    }

    .user-name {
      color: rgba(249, 249, 250, 0.98);
      font-size: 14px;
      line-height: 24px;
      margin: 0 4px 0 8px;
      max-width: 112px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-caret svg {
      width: 8px;
      height: 8px;
      color: #fff;
    }

    /* Nav overflow trigger */
    .top-menu-overflow {
      display: none;
      width: 24px;
      height: 24px;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.88);
      flex: 0 0 24px;
      cursor: pointer;
    }

    .main-frame {
      display: flex;
      min-height: calc(100vh - var(--top-nav-height));
      background: #ffffff;
    }

    .side-nav {
      width: var(--side-nav-width);
      flex: 0 0 var(--side-nav-width);
      background: var(--color-container-bg-neutral-bright);
      border-right: 1px solid var(--color-divider-neutral);
      padding: 8px 2px 0 8px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .side-nav-group-title,
    .side-nav-item {
      width: 100%;
      height: var(--side-nav-item-height);
      display: flex;
      align-items: center;
      padding: 8px 4px 8px 8px;
      border-radius: 6px;
      color: rgba(19, 34, 64, 0.95);
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      line-height: 24px;
      margin-bottom: 8px;
      transition: background 0.15s ease;
    }

    .side-nav-group-title:hover,
    .side-nav-item:not(.is-active):hover {
      background: #f3f4f6;
    }

    /* Open group with active child: title text + icons turn blue */
    .side-nav-group-title.is-selected {
      color: #1966ff;
    }

    .side-nav-group-title.is-selected .nav-icon,
    .side-nav-group-title.is-selected .nav-arrow {
      color: #1966ff;
    }

    .side-nav-item.is-active {
      color: #1966ff;
      background: #ebf3ff;
      font-weight: 500;
    }

    .side-nav-item.level-2 {
      padding: 0 4px 0 36px;
      line-height: var(--side-nav-item-height);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      color: rgba(19, 34, 64, 0.65);
      margin-right: 4px;
    }

    .nav-label {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 4px;
    }

    /* Expand arrow: always a caret-up; .contract rotates it to point down */
    .nav-arrow {
      width: 16px;
      height: 16px;
      color: rgba(19, 34, 64, 0.65);
      flex: 0 0 16px;
      margin: 0 4px 0 0;
      transition: transform 0.2s ease;
    }

    .nav-arrow.contract {
      transform: rotate(-180deg);
    }

    .work-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    /* ── Tab bar (xft-tab-header) ── */
    .xft-tab-header {
      background: #e7e9ec;
      color: rgba(19, 34, 64, 0.85);
      display: flex;
      font-size: 12px;
      font-weight: 400;
      height: 32px;
      flex: 0 0 32px;
    }

    .xft-tab-slider {
      display: flex;
      flex: 1 1;
      overflow: hidden;
    }

    .xft-tab-slide-content {
      display: flex;
      flex: 1 1;
    }

    .xft-tab-item {
      align-items: center;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      display: flex;
      height: 32px;
      padding: 6px 12px;
      position: relative;
      width: 128px;
      flex: 0 0 128px;
    }

    /* Inter-tab divider via ::before */
    .xft-tab-item::before {
      background: rgba(19, 34, 64, 0.1);
      content: "";
      display: block;
      height: 16px;
      left: 0;
      position: absolute;
      top: 8px;
      width: 1px;
    }

    .xft-tab-item:first-child::before,
    .xft-tab-item.active::before,
    .xft-tab-item:hover::before,
    .xft-tab-item.active + .xft-tab-item::before,
    .xft-tab-item:hover + .xft-tab-item::before {
      width: 0 !important;
    }

    .xft-tab-item .tab-name {
      display: inline-block;
      height: 20px;
      line-height: 20px;
      margin-right: 8px;
      width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Home tab: no close button → fill width */
    .xft-tab-item:first-child .tab-name {
      width: 100%;
      margin-right: 0;
    }

    .xft-tab-item .tab-close {
      background-color: #e7e9ec;
      border-radius: 50%;
      display: none;
      height: 16px;
      width: 16px;
      flex: 0 0 16px;
      align-items: center;
      justify-content: center;
    }

    /* Corner spans: Chrome-style "inverted corner" using radial-gradient */
    .xft-tab-item .left-corner,
    .xft-tab-item .right-corner {
      bottom: 0;
      height: 8px;
      position: absolute;
      width: 8px;
      pointer-events: none;
    }

    .xft-tab-item .left-corner {
      background: transparent;
      left: -8px;
    }

    .xft-tab-item .right-corner {
      background: radial-gradient(8px at 0 0, transparent 8px, #e7e9ec 0);
      right: -8px;
      transform: scaleX(-1);
    }

    /* Hover */
    .xft-tab-item:hover {
      background: #dcdee2;
    }

    .xft-tab-item:hover .left-corner,
    .xft-tab-item:hover .right-corner {
      background: radial-gradient(8px at 0 0, transparent 8px, #dcdee2 0);
    }

    .xft-tab-item:hover .tab-close {
      background: #dcdee2;
      display: inline-flex;
    }

    .xft-tab-item:hover .tab-close:hover {
      background-color: rgba(19, 34, 64, 0.1);
    }

    /* Active */
    .xft-tab-item.active {
      background: #f3f4f6;
      color: rgba(19, 34, 64, 0.95);
    }

    .xft-tab-item.active .left-corner,
    .xft-tab-item.active .right-corner {
      background: radial-gradient(8px at 0 0, transparent 8px, #f3f4f6 0);
    }

    .xft-tab-item.active .tab-close {
      background: #f3f4f6;
      display: inline-flex;
    }

    .xft-tab-item.active .tab-close:hover {
      background-color: rgba(19, 34, 64, 0.1);
    }

    /* Right operation area */
    .right-opr-area {
      background: #f3f4f6;
      box-shadow: -4px 0 12px 0 rgba(19, 34, 64, 0.08);
      display: flex;
      align-items: center;
      height: 32px;
      padding: 4px 16px 4px 8px;
      width: 112px;
      flex: 0 0 112px;
      gap: 8px;
    }

    .right-opr-area .prev-page,
    .right-opr-area .next-page,
    .right-opr-area .slice {
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      width: 24px;
      flex: 0 0 24px;
      color: rgba(19, 34, 64, 0.65);
    }

    .right-opr-area .prev-page:hover,
    .right-opr-area .next-page:hover,
    .right-opr-area .slice:hover {
      background: rgba(19, 34, 64, 0.05);
    }

    .right-opr-area svg {
      width: 24px;
      height: 24px;
    }

    .page-content {
      flex: 1;
      min-width: 0;
      overflow: auto;
      background: #f3f4f6;
    }

    .micro-wrapper {
      min-height: 100%;
      padding: 16px 0;
      background: #f3f4f6;
    }

    .page-content-container {
      min-height: calc(100vh - var(--top-nav-height) - 32px);
      margin: 0 16px;
      padding: 16px;
      background: #ffffff;
      border-radius: 14px;
    }

    .nav-badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: #fff1e8;
      color: #f97316;
      font-size: 12px;
      line-height: 18px;
      white-space: nowrap;
    }


    .breadcrumb-bar {
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      color: var(--color-text-neutral-gray30);
      background: #ffffff;
    }

    .more-tabs-menu {
      position: absolute;
      right: 16px;
      top: calc(var(--top-nav-height) + var(--web-tabs-height) - 2px);
      width: 188px;
      max-height: 380px;
      padding: 8px;
      border-radius: var(--border-radius-large);
      background: var(--color-container-bg-neutral-bright);
      box-shadow: var(--shadow-regular-bottom);
      border: 1px solid var(--color-divider-neutral);
      display: none;
      z-index: 30;
    }

    .more-tabs-menu.is-open {
      display: block;
    }

    .more-tab-item {
      height: 32px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      border-radius: var(--border-radius-regular);
      color: var(--color-text-neutral-gray40);
      cursor: pointer;
    }

    .more-tab-item:hover,
    .more-tab-item.is-active {
      background: var(--color-bg-accent-light);
      color: var(--color-text-accent-regular);
    }

    .more-tab-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .more-tabs-footer {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--color-divider-neutral);
      text-align: center;
      color: var(--color-text-neutral-gray40);
      cursor: pointer;
    }

    .card,
    .section-card,
    .form-card {
      background: var(--color-container-bg-neutral-bright);
      border: 1px solid var(--color-divider-neutral);
      border-radius: var(--border-radius-large);
    }

    .form-card {
      padding: 24px;
    }

    .form-section {
      padding-bottom: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--color-divider-neutral);
    }

    .form-section:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 16px;
      line-height: 24px;
      font-weight: 600;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 16px 24px;
    }

    .summary-card {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .summary-item {
      padding: 16px;
      border: 1px solid var(--color-divider-neutral);
      border-radius: var(--border-radius-large);
      background: var(--color-container-bg-neutral-lightgray);
    }

    .detail-section {
      margin-top: 16px;
    }

    .settings-layout {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 24px;
    }

    .settings-anchor {
      padding: 16px;
      border: 1px solid var(--color-divider-neutral);
      border-radius: var(--border-radius-large);
      background: var(--color-container-bg-neutral-bright);
    }

    .settings-anchor-item {
      padding: 8px 12px;
      border-radius: var(--border-radius-regular);
      color: var(--color-text-neutral-gray40);
      cursor: pointer;
    }

    .settings-anchor-item.is-active {
      background: var(--color-bg-accent-light);
      color: var(--color-text-accent-regular);
      font-weight: 500;
    }

    .settings-section {
      padding: 24px;
      border: 1px solid var(--color-divider-neutral);
      border-radius: var(--border-radius-large);
      background: var(--color-container-bg-neutral-bright);
    }

    .settings-section-title {
      margin-bottom: 16px;
      font-size: 16px;
      font-weight: 600;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0;
      border-top: 1px solid var(--color-divider-neutral);
    }

    .setting-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .setting-title {
      font-weight: 500;
      color: var(--color-text-neutral-gray50);
    }

    .setting-description {
      margin-top: 4px;
      color: var(--color-text-neutral-gray30);
      font-size: 13px;
      line-height: 20px;
    }

    .empty-state,
    .loading-state,
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 180px;
      padding: 24px;
      border: 1px dashed var(--color-border-neutral);
      border-radius: var(--border-radius-large);
      color: var(--color-text-neutral-gray30);
      text-align: center;
      background: var(--color-container-bg-neutral-lightgray);
    }

    .overlay-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.38);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
    }

    .overlay-panel-header,
    .overlay-panel-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .overlay-panel-header {
      padding: 20px 24px 0;
    }

    .overlay-panel-body {
      padding: 16px 24px 24px;
    }

    .overlay-panel-footer {
      padding: 0 24px 24px;
      justify-content: flex-end;
    }

    .modal,
    .confirm-dialog {
      width: min(560px, 100%);
      border-radius: var(--border-radius-large);
      background: var(--color-container-bg-neutral-bright);
      box-shadow: var(--shadow-large-bottom);
      overflow: hidden;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(480px, 100vw);
      height: 100vh;
      background: var(--color-container-bg-neutral-bright);
      box-shadow: var(--shadow-large-left);
      display: flex;
      flex-direction: column;
      z-index: 1001;
    }

    .overlay-title {
      margin: 0;
      font-size: 18px;
      line-height: 26px;
      font-weight: 600;
      color: var(--color-text-neutral-gray50);
    }

    .overlay-description {
      margin: 8px 0 0;
      color: var(--color-text-neutral-gray30);
      font-size: 13px;
