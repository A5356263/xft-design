<!-- region.editable-table.basic -->
<div class="editable-table-wrap" data-xft-region="editable-table" data-xft-variant="basic">
  <table class="data-table editable-table">
    <thead>
      <tr>
        <th>项目名称</th>
        <th>类型</th>
        <th>负责人</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><div class="form-control is-inline">请输入项目名称</div></td>
        <td><div class="select-control is-inline">请选择类型</div></td>
        <td><div class="form-control is-inline">请输入负责人</div></td>
        <td><div class="select-control is-inline">请选择状态</div></td>
        <td>
          <div class="editable-row-actions">
            <button class="btn btn-text" type="button">新增行</button>
            <button class="btn btn-text" type="button">删除</button>
          </div>
        </td>
      </tr>
      <tr>
        <td><div class="form-control is-inline">员工台账规则</div></td>
        <td><div class="select-control is-inline">基础配置</div></td>
        <td><div class="form-control is-inline">张峰</div></td>
        <td><div class="select-control is-inline">启用中</div></td>
        <td>
          <div class="editable-row-actions">
            <button class="btn btn-text" type="button">复制</button>
            <button class="btn btn-text" type="button">删除</button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
