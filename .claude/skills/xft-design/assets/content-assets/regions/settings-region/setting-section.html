<!-- region.setting-section.basic | sources: M015,M054,M060,M071 -->
<section class="settings-section" data-xft-region="setting-section" data-xft-variant="basic">
  <div class="settings-section-title">基础设置</div>
  <div class="setting-item">
    <div class="setting-main">
      <div class="setting-title">启用成员自动同步</div>
      <div class="setting-description">开启后，组织架构调整会自动同步到成员台账，并在次日生效。</div>
    </div>
    <div class="setting-status"><button class="switch is-checked" type="button"><span class="switch-handle"></span></button></div>
  </div>
  <div class="setting-item">
    <div class="setting-main">
      <div class="setting-title">字段展示规则</div>
      <div class="setting-description">控制成员列表默认字段、详情展示顺序以及导出模板字段范围。</div>
    </div>
    <div class="setting-status"><button class="btn btn-secondary" type="button">进入配置</button></div>
  </div>
</section>
