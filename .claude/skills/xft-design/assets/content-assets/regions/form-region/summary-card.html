<section class="region-card form-summary-card-region">
  <header class="region-header">
    <div>
      <h3 class="region-title">填写说明</h3>
      <p class="region-desc">先确认申请范围、协同角色与提交前校验要求，再进入分组录入。</p>
    </div>
    <span class="status-chip status-processing">录入中</span>
  </header>
  <div class="detail-summary-grid">
    <article class="summary-item-card">
      <span class="summary-label">生效范围</span>
      <strong class="summary-value">华东大区 / 全职员工</strong>
      <p class="summary-meta">保存后同步到员工主数据和审批视图</p>
    </article>
    <article class="summary-item-card">
      <span class="summary-label">协同角色</span>
      <strong class="summary-value">人事专员 / 部门负责人</strong>
      <p class="summary-meta">人事提交，负责人仅做补充确认</p>
    </article>
    <article class="summary-item-card">
      <span class="summary-label">提交校验</span>
      <strong class="summary-value">必填 + 明细完整性</strong>
      <p class="summary-meta">动态明细缺项时不允许提交</p>
    </article>
  </div>
</section>
