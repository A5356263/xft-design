<!-- region.form-section.horizontal -->
<div class="form-card" data-xft-region="form-section" data-xft-variant="horizontal">
  <section class="form-section">
    <h2 class="section-title">基础信息</h2>
    <div class="horizontal-form-grid">
      <div class="horizontal-form-row">
        <label class="field-label">单据名称</label>
        <div class="horizontal-form-control">
          <div class="form-control">请输入单据名称</div>
          <div class="field-help">用于列表和详情页识别。</div>
        </div>
      </div>
      <div class="horizontal-form-row">
        <label class="field-label">归属部门</label>
        <div class="horizontal-form-control">
          <div class="select-control">请选择归属部门</div>
        </div>
      </div>
      <div class="horizontal-form-row">
        <label class="field-label">负责人</label>
        <div class="horizontal-form-control">
          <div class="form-control">请输入负责人</div>
        </div>
      </div>
      <div class="horizontal-form-row">
        <label class="field-label">说明</label>
        <div class="horizontal-form-control">
          <div class="textarea-control">请输入补充说明</div>
        </div>
      </div>
    </div>
  </section>
</div>
