<!-- region.quick-entry-grid.basic -->
<section
  class="quick-entry-grid"
  data-xft-asset="region.quick-entry-grid.basic"
  data-xft-layer="region"
  data-xft-variant="basic"
>
  <div class="page-card">
    <div class="card-header">
      <div class="card-header-title">快捷入口</div>
    </div>
    <div class="card-body">
      <div class="quick-entry-items">
        <button class="quick-entry-item" type="button">
          <span class="quick-entry-name">新增成员</span>
          <span class="quick-entry-desc">发起成员录入</span>
        </button>
        <button class="quick-entry-item" type="button">
          <span class="quick-entry-name">发起审批</span>
          <span class="quick-entry-desc">快速创建审批单</span>
        </button>
        <button class="quick-entry-item" type="button">
          <span class="quick-entry-name">导出报表</span>
          <span class="quick-entry-desc">按筛选条件导出</span>
        </button>
        <button class="quick-entry-item" type="button">
          <span class="quick-entry-name">配置字段</span>
          <span class="quick-entry-desc">进入复杂配置中心</span>
        </button>
      </div>
    </div>
  </div>
</section>
