<section class="module-card dynamic-form-list-module">
  <div class="module-header">
    <div>
      <h4 class="module-title">动态明细录入</h4>
      <p class="module-desc">用于批量补充成员条目、费用项或扩展配置。</p>
    </div>
    <button class="button button-secondary" type="button">新增一行</button>
  </div>
  <div class="table-shell">
    <table class="data-table">
      <thead>
        <tr>
          <th>条目名称</th>
          <th>类别</th>
          <th>说明</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input class="input" type="text" value="试用期补充信息" /></td>
          <td>
            <select class="input">
              <option>基础资料</option>
              <option selected>扩展字段</option>
            </select>
          </td>
          <td><input class="input" type="text" value="补充社保起缴时间和工号前缀" /></td>
          <td><span class="status-chip status-success">已完成</span></td>
          <td><button class="button button-link" type="button">删除</button></td>
        </tr>
        <tr>
          <td><input class="input" type="text" value="紧急联系人" /></td>
          <td>
            <select class="input">
              <option selected>基础资料</option>
              <option>扩展字段</option>
            </select>
          </td>
          <td><input class="input" type="text" value="补录联系人姓名、关系和电话" /></td>
          <td><span class="status-chip status-warning">待完善</span></td>
          <td><button class="button button-link" type="button">删除</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
