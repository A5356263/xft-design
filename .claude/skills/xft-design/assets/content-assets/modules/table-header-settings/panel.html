<section class="module-card" data-module="table-header-settings-panel">
  <div class="module-header">
    <div class="module-title">表头设置</div>
    <div class="module-actions"><button class="btn btn-secondary" type="button">重置</button><button class="btn btn-primary" type="button">应用</button></div>
  </div>
  <div class="module-body config-panel">
    <div class="config-list">
      <div class="config-list-item is-active"><span>显示列</span><span>8/12</span></div>
      <div class="config-list-item"><span>固定列</span><span>2</span></div>
      <div class="config-list-item"><span>排序</span><span>自定义</span></div>
    </div>
    <div class="config-detail">
      <div class="drag-sort-list">
        <div class="drag-sort-item"><span class="drag-handle">⋮⋮</span><label class="checkbox"><input class="checkbox-input" type="checkbox" checked><span class="checkbox-label">名称</span></label><span class="module-muted">左固定</span></div>
        <div class="drag-sort-item"><span class="drag-handle">⋮⋮</span><label class="checkbox"><input class="checkbox-input" type="checkbox" checked><span class="checkbox-label">状态</span></label><span class="module-muted">普通列</span></div>
        <div class="drag-sort-item"><span class="drag-handle">⋮⋮</span><label class="checkbox"><input class="checkbox-input" type="checkbox"><span class="checkbox-label">备注</span></label><span class="module-muted">隐藏</span></div>
      </div>
    </div>
  </div>
</section>
