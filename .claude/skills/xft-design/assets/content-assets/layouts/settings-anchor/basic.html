<!-- layout.settings-anchor.basic -->
<section
  class="xft-layout-settings-anchor"
  data-xft-asset="layout.settings-anchor.basic"
  data-xft-layer="layout"
  data-xft-variant="basic"
>
  <aside class="settings-anchor-panel" aria-label="设置分组导航">
    <div class="settings-anchor" data-anchor-root>
      <button class="settings-anchor-item is-active" type="button" data-anchor-target="settings-basic">基础设置</button>
      <button class="settings-anchor-item" type="button" data-anchor-target="settings-scope">生效范围</button>
      <button class="settings-anchor-item" type="button" data-anchor-target="settings-history">最近变更</button>
    </div>
  </aside>
  <section class="settings-content-panel">
    <!-- SETTINGS_CONTENT_SLOT -->
  </section>
</section>
