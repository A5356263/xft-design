<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应用内首页</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: "PingFang SC","Microsoft YaHei",sans-serif; font-size: 14px; color: #17181a; }

/* ── Global Shell ── */
.global-shell {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 48px;
  background: linear-gradient(135deg, #3C8AFF 0%, #4255FF 100%);
  display: flex; align-items: center; justify-content: flex-start;
  padding: 0 24px; color: #fff;
}
.global-shell .logo { font-size: 16px; font-weight: 700; margin-right: 32px; }
.global-shell .nav { display: flex; gap: 24px; font-size: 14px; }
.global-shell .nav span { opacity: .85; cursor: pointer; padding: 4px 0; border-bottom: 2px solid transparent; transition: .2s; }
.global-shell .nav span:hover,
.global-shell .nav span.active { opacity: 1; border-bottom-color: #fff; }
.global-shell .user-area { margin-left: auto; display: flex; align-items: center; gap: 16px; font-size: 13px; }
.global-shell .user-area .avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-size: 12px; }
.global-shell .user-area .icon { font-size: 16px; cursor: pointer; }

/* ── App Shell — Sidebar ── */
.sidebar {
  position: fixed; top: 48px; left: 0; bottom: 0; z-index: 999;
  width: 220px; background: #fff; border-right: 1px solid #f0f0f0;
  display: flex; flex-direction: column; padding: 16px 0;
}
.sidebar .menu-item {
  padding: 10px 24px; color: #595959; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; gap: 10px; transition: .15s;
}
.sidebar .menu-item:hover { background: #f5f5f5; color: #4255FF; }
.sidebar .menu-item.active { background: #eef0ff; color: #4255FF; font-weight: 600; }
.sidebar .menu-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #4255FF; }
.sidebar .divider { margin: 8px 24px; border-top: 1px solid #f0f0f0; }
.sidebar .section-title { padding: 0 24px 8px; color: #999; font-size: 12px; }

/* ── Page Header ── */
.page-header {
  position: fixed; top: 48px; left: 220px; right: 0; z-index: 998;
  height: 32px; background: #e7e9ec;
  display: flex; align-items: center; padding: 0 24px; gap: 0; font-size: 13px;
}
.page-header .tab {
  padding: 0 16px; color: #595959; cursor: pointer;
}

/* ── Content Area ── */
.content-area {
  margin-left: 220px; padding-top: 80px;
  padding-left: 24px; padding-right: 24px; padding-bottom: 24px;
  background: #f3f4f6; min-height: 100vh;
}

/* ── 3-Column Grid ── */
.workbench-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  max-width: 1400px;
}
.card {
  background: #fff; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.06);
  padding: 16px 20px; min-height: 160px;
}
.card .card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.card .card-content { font-size: 13px; color: #595959; line-height: 1.8; }
.card.span-1 { grid-column: span 1; }
.card.span-2 { grid-column: span 2; }
.card.span-3 { grid-column: span 3; }
</style>
</head>
<body>

<!-- Global Shell -->
<div class="global-shell">
  <div class="logo">CMB 工作平台</div>
  <div class="nav">
    <span class="active">工作台</span>
    <span>全部应用</span>
  </div>
  <div class="user-area">
    <span class="icon">🔔</span>
    <span class="avatar">U</span>
    <span>用户名</span>
  </div>
</div>

<!-- App Shell — Sidebar -->
<div class="sidebar">
  <div class="section-title">导航菜单</div>
  <div class="menu-item active"><span class="dot"></span>首页概览</div>
  <div class="menu-item">任务管理</div>
  <div class="menu-item">审批流程</div>
  <div class="divider"></div>
  <div class="section-title">其他</div>
  <div class="menu-item">数据报表</div>
  <div class="menu-item">系统设置</div>
</div>

<!-- Page Header -->
<div class="page-header">
  <div class="tab">概览</div>
  <div class="tab">详情</div>
  <div class="tab">日志</div>
</div>

<!-- Content Area -->
<div class="content-area">
  <div class="workbench-grid">

    <!-- Row 1: span-2 + span-1 -->
    <div class="card span-2"></div>
    <div class="card span-1"></div>

    <!-- Row 2: span-1 + span-1 + span-1 -->
    <div class="card span-1"></div>
    <div class="card span-1"></div>
    <div class="card span-1"></div>

    <!-- Row 3: span-3 -->
    <div class="card span-3"></div>

  </div>
</div>

</body>
</html>
