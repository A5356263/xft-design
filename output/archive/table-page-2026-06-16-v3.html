    /* Shell local variables: layout sizes and shell-only brand gradient. Not design tokens. */
    :root {
      --color-nav-gradient-start: #3C8AFF;
      --color-nav-gradient-end: #4255FF;
      --color-nav-text: #FFFFFF;

      --top-brand-width: 160px;
      --side-nav-width: 188px;
      --side-nav-item-width: 172px;

    * {

    }

    body {
      margin: 0;
      color: var(--color-text-neutral-gray50);
      background: var(--color-layout-bg-neutral-gray);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        Arial,
        sans-serif;
      font-size: 14px;
      line-height: 22px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      background: var(--color-layout-bg-neutral-gray);
      position: relative;
    }

    .top-nav {
      height: var(--top-nav-height);
      display: flex;
      align-items: center;
      padding: 0;
      background: linear-gradient(117.84deg, var(--color-nav-gradient-start), var(--color-nav-gradient-end));
      position: sticky;
      top: 0;
      z-index: 20;
    }

    /* Nav layout */
    .nav-left {
      display: flex;
      align-items: center;
      flex: 1 1;
      padding-left: 14px;
      width: 0;
      min-width: 0;
      overflow: hidden;
    }

    .nav-left-content {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
    }

    .nav-center {
      height: 100%;
      padding-right: 48px;
      flex: 0 0 auto;
    }

    .nav-right {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      height: 100%;
      padding-right: 12px;
    }

    .nav-right-content {
      display: flex;
      align-items: center;
    }

    /* Product title */
    .product-title {
      flex: 0 0 auto;
      padding: 0 16px 0 6px;
      color: rgba(249, 249, 250, 0.98);
      font-size: 22px;
      line-height: 26px;
      font-family: 'Alimama_ShuHeiTi_Bold', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-weight: 400;
      white-space: nowrap;
    }

    /* Enterprise tenant switch */
    .nav-item-wrap {
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
    }

    .nav-item-wrap:hover {
      background: rgba(249, 249, 250, 0.1);
    }

    .nav-item-wrap.with-padding {
      padding: 4px 8px 4px 6px;
    }

    .nav-item-wrap-search {
      padding: 0 4px;
    }

    .nav-item-wrap-user {
      padding: 2px 8px;
    }

    .enterprise-box {
      display: flex;
      align-items: center;
    }

    .enterprise-icon {
      color: #fff;
      padding: 0 4px 0 2px;
      display: flex;
      align-items: center;
    }

    .enterprise-name {
      color: rgba(249, 249, 250, 0.98);
      font-size: 14px;
      height: 22px;
      max-width: 222px;
      padding-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-caret {
      color: #fff;
      margin-left: 4px;
      display: flex;
      align-items: center;
      flex: 0 0 auto;
    }

    /* App nav divider (pseudo via container) */
    .nav-app-wrap {
      display: flex;
      align-items: center;
      flex: 1 1;
      overflow: hidden;
      width: 0;
    }

    .nav-divider-pseudo {
      background: rgba(255, 255, 255, 0.2);
      height: 18px;
      width: 1px;
      flex: 0 0 1px;
      margin-left: 8px;

    /* App nav */
    .xft-app-nav {
      display: flex;
      align-items: center;
      height: 48px;
      padding: 4px;

    .app-nav {
      display: flex;
      align-items: center;
    }

      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      font-size: 14px;
      height: 40px;
      padding: 0 12px;
      position: relative;
      transition: all 0.15s ease;
      flex: 0 0 auto;
      white-space: nowrap;
      line-height: 22px;
    }

    .nav-app-content {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-app-active {
      background: #fff;
      height: 0;
      left: 0;
      margin: 0 12px;
      position: absolute;
      top: 38px;
      width: calc(100% - 24px);

    .nav-app.is-active {
      font-weight: 600;

    .nav-app.is-active .nav-app-active {

    }

    .top-menu-icon {

      height: 16px;
      flex: 0 0 16px;

    .all-app-entry {

      align-items: center;
      padding: 0 10px 0 8px;

    .all-app-container {

      align-items: center;
      color: rgba(249, 249, 250, 0.98);
      font-size: 14px;
      gap: 4px;
    }

    .all-app-icon {
      color: rgba(249, 249, 250, 0.98);
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
    }

    /* Global search */
    .global-search {
      width: 240px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.5);
      border: none;
      flex: 0 0 auto;
    }

    .global-search:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .global-search svg {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .global-search span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      flex: 1;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Right nav icons */
    .nav-tool {
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
    }

    .nav-tool:hover {
      background: rgba(249, 249, 250, 0.1);
    }

    .top-nav-icon {
      width: 24px;
      height: 24px;
      color: rgba(249, 249, 250, 0.98);
      display: block;
    }

    /* Divider in right section */
    .nav-divider-vertical {
      background: rgba(249, 249, 250, 0.14);
      border-radius: 1px;
      height: 16px;
      width: 1px;
      flex: 0 0 1px;
      margin: 0 4px;
    }

    /* User avatar */
    .user-avatar-wrap {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .user-logo-box {
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      height: 28px;
      width: 28px;
      position: relative;
      overflow: hidden;
      flex: 0 0 28px;
    }

    .user-logo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1966ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
    }

    .user-name {
      color: rgba(249, 249, 250, 0.98);
      font-size: 14px;
      line-height: 24px;
      margin: 0 4px 0 8px;
      max-width: 112px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-caret svg {
      width: 8px;
      height: 8px;
      color: #fff;
    }

    /* Nav overflow trigger */
    .top-menu-overflow {
      display: none;
      width: 24px;
      height: 24px;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.88);
      flex: 0 0 24px;
      cursor: pointer;
    }

    .main-frame {
      display: flex;
      min-height: calc(100vh - var(--top-nav-height));
      background: #ffffff;
    }

    .side-nav {
      width: var(--side-nav-width);
      flex: 0 0 var(--side-nav-width);
      background: var(--color-container-bg-neutral-bright);
      border-right: 1px solid var(--color-divider-neutral);
      padding: 8px 2px 0 8px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .side-nav-group-title,
    .side-nav-item {
      width: 100%;
      height: var(--side-nav-item-height);
      display: flex;
      align-items: center;
      padding: 8px 4px 8px 8px;
      border-radius: 6px;
      color: rgba(19, 34, 64, 0.95);
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      line-height: 24px;
      margin-bottom: 8px;
      transition: background 0.15s ease;
    }

    .side-nav-group-title:hover,
    .side-nav-item:not(.is-active):hover {
      background: #f3f4f6;
    }

    /* Open group with active child: title text + icons turn blue */
    .side-nav-group-title.is-selected {
      color: #1966ff;
    }

    .side-nav-group-title.is-selected .nav-icon,
    .side-nav-group-title.is-selected .nav-arrow {
      color: #1966ff;
    }

    .side-nav-item.is-active {
      color: #1966ff;
      background: #ebf3ff;
      font-weight: 500;
    }

    .side-nav-item.level-2 {
      padding: 0 4px 0 36px;
      line-height: var(--side-nav-item-height);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      color: rgba(19, 34, 64, 0.65);
      margin-right: 4px;
    }

    .nav-label {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 4px;
    }

    /* Expand arrow: always a caret-up; .contract rotates it to point down */
    .nav-arrow {
      width: 16px;
      height: 16px;
      color: rgba(19, 34, 64, 0.65);
      flex: 0 0 16px;
      margin: 0 4px 0 0;
      transition: transform 0.2s ease;
    }

    .nav-arrow.contract {
      transform: rotate(-180deg);
    }

    .work-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    /* ── Tab bar (xft-tab-header) ── */
    .xft-tab-header {
      background: #e7e9ec;
      color: rgba(19, 34, 64, 0.85);
      display: flex;
      font-size: 12px;
      font-weight: 400;
      height: 32px;
      flex: 0 0 32px;
    }

    .xft-tab-slider {
      display: flex;
      flex: 1 1;
      overflow: hidden;
    }

    .xft-tab-slide-content {
      display: flex;
      flex: 1 1;
    }

    .xft-tab-item {
      align-items: center;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      display: flex;
      height: 32px;
      padding: 6px 12px;
      position: relative;
      width: 128px;
      flex: 0 0 128px;
    }

    /* Inter-tab divider via ::before */
    .xft-tab-item::before {
      background: rgba(19, 34, 64, 0.1);
      content: "";
      display: block;
      height: 16px;
      left: 0;
      position: absolute;
      top: 8px;
      width: 1px;
    }

    .xft-tab-item:first-child::before,
    .xft-tab-item.active::before,
    .xft-tab-item:hover::before,
    .xft-tab-item.active + .xft-tab-item::before,
    .xft-tab-item:hover + .xft-tab-item::before {
      width: 0 !important;
    }

    .xft-tab-item .tab-name {
      display: inline-block;
      height: 20px;
      line-height: 20px;
      margin-right: 8px;
      width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Home tab: no close button → fill width */
    .xft-tab-item:first-child .tab-name {
      width: 100%;
      margin-right: 0;
    }

    .xft-tab-item .tab-close {
      background-color: #e7e9ec;
      border-radius: 50%;
      display: none;
      height: 16px;
      width: 16px;
      flex: 0 0 16px;
      align-items: center;
      justify-content: center;
    }

    /* Corner spans: Chrome-style "inverted corner" using radial-gradient */
    .xft-tab-item .left-corner,
    .xft-tab-item .right-corner {
      bottom: 0;
      height: 8px;
      position: absolute;
      width: 8px;
      pointer-events: none;
    }

    .xft-tab-item .left-corner {
      background: transparent;
      left: -8px;
    }

    .xft-tab-item .right-corner {
      background: radial-gradient(8px at 0 0, transparent 8px, #e7e9ec 0);
      right: -8px;
      transform: scaleX(-1);
    }

    /* Hover */
    .xft-tab-item:hover {
      background: #dcdee2;
    }

    .xft-tab-item:hover .left-corner,
    .xft-tab-item:hover .right-corner {
      background: radial-gradient(8px at 0 0, transparent 8px, #dcdee2 0);
    }

    .xft-tab-item:hover .tab-close {
      background: #dcdee2;
      display: inline-flex;
    }

    .xft-tab-item:hover .tab-close:hover {
      background-color: rgba(19, 34, 64, 0.1);
    }

    /* Active */
    .xft-tab-item.active {
      background: #f3f4f6;
      color: rgba(19, 34, 64, 0.95);
    }

    .xft-tab-item.active .left-corner,
    .xft-tab-item.active .right-corner {
      background: radial-gradient(8px at 0 0, transparent 8px, #f3f4f6 0);
    }

    .xft-tab-item.active .tab-close {
      background: #f3f4f6;
      display: inline-flex;
    }

    .xft-tab-item.active .tab-close:hover {
      background-color: rgba(19, 34, 64, 0.1);

  font-weight: var(--font-weight-bold);
}

.setting-description {
  color: var(--color-text-neutral-gray30);
  font-size: var(--font-size-small);
  line-height: calc(var(--font-size-small) * var(--font-height-regular));
}

/* ══ Overlays ═════════════════════════════════════════════════════════════ */

.overlay-mask {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--spacing-6);
  background: var(--color-container-bg-neutral-inverse);
  z-index: 1000;
}

.overlay-mask-right {
  justify-content: flex-end;
  padding: 0;
}

.modal,
.confirm-dialog,
.overlay-panel {
  width: min(560px, 100%);
  border-radius: var(--border-radius-large);
  background: var(--color-container-bg-neutral-bright);
  box-shadow: var(--shadow-large-bottom);
  overflow: hidden;
}

.drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: min(480px, 100vw);
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--color-container-bg-neutral-bright);
  box-shadow: var(--shadow-large-left);
  z-index: 1001;
}

.overlay-header,
.overlay-footer,
.overlay-panel-header,
.overlay-panel-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--spacing-3);
}

.overlay-header,
.overlay-panel-header {
  padding: var(--spacing-5) var(--spacing-6) 0;
}

.overlay-body,
.overlay-panel-body {
  padding: var(--spacing-4) var(--spacing-6) var(--spacing-6);
}

.overlay-body-scroll {
  flex: 1;
  overflow: auto;
}

.overlay-footer,
.overlay-panel-footer {
  padding: 0 var(--spacing-6) var(--spacing-6);
  justify-content: flex-end;
}

.overlay-title {
  margin: 0;
  color: var(--color-text-neutral-gray50);
  font-size: var(--font-size-heading-4);
  line-height: calc(var(--font-size-heading-4) * var(--font-height-tight));
  font-weight: var(--font-weight-bold);
}

.overlay-description {
  margin: var(--spacing-2) 0 0;
  color: var(--color-text-neutral-gray30);
  font-size: var(--font-size-small);
  line-height: calc(var(--font-size-small) * var(--font-height-regular));
}

/* ══ Legacy Content Tabs ══════════════════════════════════════════════════ */

.content-tabs {
  display: flex;
  gap: 0;
  margin-bottom: var(--spacing-4);
  border-bottom: 2px solid var(--color-divider-neutral);
}

.content-tab {
  position: relative;
  height: 40px;
  display: inline-flex;
  align-items: center;
  padding: 0 var(--spacing-5);
  margin-bottom: -2px;
  border-bottom: 2px solid transparent;
  color: var(--color-text-neutral-gray30);
  cursor: pointer;
  transition:
    color var(--motion-fast) var(--ease-standard),
    border-color var(--motion-fast) var(--ease-standard);
}

.content-tab:hover {
  color: var(--color-text-accent-regular);
}

.content-tab.is-active {
  color: var(--color-text-accent-regular);
  border-bottom-color: var(--color-border-accent-regular);
  font-weight: var(--font-weight-bold);
}

.content-tab .tab-count {
  margin-left: var(--spacing-2);
  padding: 0 var(--spacing-2);
  border-radius: 999px;
  background: var(--color-container-bg-neutral-gray-hover);
  font-size: var(--font-size-small);
  line-height: 20px;
}

.content-tab.is-active .tab-count {
  background: var(--color-bg-accent-light);
}

          <option value="培训">培训</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label class="field-label" for="prioritySelect">紧急程度</label>
      <div class="field-control">
        <select id="prioritySelect">
          <option value="all">全部优先级</option>
          <option value="加急">加急</option>
          <option value="临近超时">临近超时</option>
          <option value="常规">常规</option>
        </select>
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn btn-primary" type="button" id="queryBtn">查询</button>
      <button class="btn btn-secondary" type="button" id="resetBtn">重置</button>
    </div>
  </div>

  <div class="page-card">
    <div class="table-toolbar">
      <div class="table-toolbar-left">
        <div>
          <div class="table-toolbar-title">待办审批列表</div>
          <div class="toolbar-info" id="toolbarInfo">优先展示待审批与高风险待复核单据，支持勾选后批量处理。</div>
        </div>
      </div>
      <div class="table-toolbar-right">
        <button class="btn btn-secondary" type="button" id="batchRejectBtn" disabled>批量退回</button>
        <button class="btn btn-primary" type="button" id="batchApproveBtn" disabled>批量通过</button>
      </div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th class="checkbox-col text-center"><input id="selectAll" class="table-checkbox" type="checkbox" aria-label="全选当前页" /></th>
            <th>单据编号</th>
            <th>申请人</th>
            <th>报销信息</th>
            <th>提交时间</th>
            <th class="text-right">金额</th>
            <th>审批时效</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="approvalTableBody"></tbody>
      </table>
    </div>

    <div class="pagination">
      <span class="pagination-info" id="paginationInfo">共 0 条</span>
      <div class="pagination-actions" id="paginationActions"></div>
    </div>
  </div>
</section>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="overlay-root">
      
    </div>
  </div>
  <script>
    const pageSize = 5;
    const approvalData = [
      { id: 'BX20260616001', applicant: '林乔', department: '华东销售一部', type: '差旅', amount: 4860, submittedAt: '2026-06-16 09:12', status: '待审批', priority: '加急', purpose: '上海客户拜访与驻场支持', agingLabel: '剩余 1 小时', agingState: 'is-urgent', note: '住宿与高铁票已齐全，可直接处理', selected: false },
      { id: 'BX20260616002', applicant: '周楠', department: '采购中心', type: '采购', amount: 1280, submittedAt: '2026-06-16 08:46', status: '高风险待复核', priority: '临近超时', purpose: '供应商样品加急采购', agingLabel: '剩余 3 小时', agingState: 'is-warning', note: '存在超预算 8%，需复核后处理', selected: false },
      { id: 'BX20260616003', applicant: '郑予安', department: '品牌市场部', type: '招待', amount: 920, submittedAt: '2026-06-15 18:20', status: '待审批', priority: '常规', purpose: '线下渠道沙龙物料与茶歇', agingLabel: '剩余 12 小时', agingState: '', note: '预算占用正常，建议本批处理', selected: false },
      { id: 'BX20260616004', applicant: '宋知远', department: '人力资源部', type: '培训', amount: 3600, submittedAt: '2026-06-15 15:02', status: '已通过', priority: '常规', purpose: '主管培训营会务费', agingLabel: '已完成', agingState: '', note: '2026-06-15 17:18 已审批通过', selected: false },
      { id: 'BX20260616005', applicant: '顾念', department: '运营支持部', type: '办公', amount: 540, submittedAt: '2026-06-15 14:11', status: '已退回', priority: '常规', purpose: '办公耗材与快递费', agingLabel: '已退回', agingState: '', note: '发票抬头不一致，待补件', selected: false },
      { id: 'BX20260616006', applicant: '沈越', department: '华南销售二部', type: '差旅', amount: 7350, submittedAt: '2026-06-15 11:37', status: '待审批', priority: '临近超时', purpose: '广州巡店与客户复盘会议', agingLabel: '剩余 4 小时', agingState: 'is-warning', note: '差旅补贴口径已匹配，可批量处理', selected: false },
      { id: 'BX20260616007', applicant: '程栖', department: '技术交付中心', type: '办公', amount: 1680, submittedAt: '2026-06-15 10:28', status: '待审批', priority: '常规', purpose: '项目驻场设备配件采购', agingLabel: '剩余 9 小时', agingState: '', note: '已附设备签收单', selected: false },
      { id: 'BX20260616008', applicant: '梁夏', department: '董事会办公室', type: '招待', amount: 2980, submittedAt: '2026-06-15 09:46', status: '高风险待复核', priority: '加急', purpose: '重点客户商务接待', agingLabel: '剩余 2 小时', agingState: 'is-urgent', note: '招待标准超限，建议先退回说明', selected: false }
    ];

    const filters = { keyword: '', status: 'all', type: 'all', priority: 'all' };
    let currentPage = 1;

    const keywordInput = document.getElementById('keywordInput');
    const statusSelect = document.getElementById('statusSelect');
    const typeSelect = document.getElementById('typeSelect');
    const prioritySelect = document.getElementById('prioritySelect');
    const tableBody = document.getElementById('approvalTableBody');
    const paginationInfo = document.getElementById('paginationInfo');
    const paginationActions = document.getElementById('paginationActions');
    const toolbarInfo = document.getElementById('toolbarInfo');
    const selectAll = document.getElementById('selectAll');
    const batchApproveBtn = document.getElementById('batchApproveBtn');
    const batchRejectBtn = document.getElementById('batchRejectBtn');
    const headerBatchApproveBtn = document.getElementById('headerBatchApproveBtn');
    const openRuleBtn = document.getElementById('openRuleBtn');

    function isActionable(item) {
      return item.status === '待审批' || item.status === '高风险待复核';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getStatusClass(status) {
      if (status === '待审批') return 'status-info';
      if (status === '高风险待复核') return 'status-warning';
      if (status === '已通过') return 'status-success';
      if (status === '已退回') return 'status-error';
      return 'status-neutral';
    }

    function getFilteredData() {
      const keyword = filters.keyword.trim().toLowerCase();
      return approvalData.filter((item) => {
        const keywordMatched = !keyword || [item.id, item.applicant, item.purpose, item.department].some((field) => String(field).toLowerCase().includes(keyword));
        const statusMatched = filters.status === 'all' || item.status === filters.status;
        const typeMatched = filters.type === 'all' || item.type === filters.type;
        const priorityMatched = filters.priority === 'all' || item.priority === filters.priority;
        return keywordMatched && statusMatched && typeMatched && priorityMatched;
      });
    }

    function getPageItems(data) {
      const totalPages = Math.max(1, Math.ceil(data.length / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      return data.slice(start, start + pageSize);
    }

    function updateSelectionState() {
      const pageItems = getPageItems(getFilteredData());
      const selectedActionable = approvalData.filter((item) => item.selected && isActionable(item));
      const actionableOnPage = pageItems.filter(isActionable);
      const selectedOnPage = actionableOnPage.filter((item) => item.selected);
      selectAll.checked = actionableOnPage.length > 0 && selectedOnPage.length === actionableOnPage.length;
      selectAll.indeterminate = selectedOnPage.length > 0 && selectedOnPage.length < actionableOnPage.length;
      const hasSelection = selectedActionable.length > 0;
      batchApproveBtn.disabled = !hasSelection;
      batchRejectBtn.disabled = !hasSelection;
      headerBatchApproveBtn.disabled = !hasSelection;
    }

    function renderToolbarInfo(filtered) {
      const pending = filtered.filter((item) => item.status === '待审批').length;
      const risky = filtered.filter((item) => item.status === '高风险待复核').length;
      const selected = approvalData.filter((item) => item.selected && isActionable(item)).length;
      toolbarInfo.textContent = `当前结果 ${filtered.length} 条，其中待审批 ${pending} 条，高风险待复核 ${risky} 条，已选 ${selected} 条。`;
    }

    function renderRows() {
      const filtered = getFilteredData();
      const pageItems = getPageItems(filtered);
      renderToolbarInfo(filtered);
      if (pageItems.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="9" class="text-center">没有符合条件的报销单，请调整筛选条件后重试。</td></tr>';
        paginationInfo.textContent = '共 0 条';
        paginationActions.innerHTML = '';
        updateSelectionState();
        return;
      }

      tableBody.innerHTML = pageItems.map((item) => {
        const disabledAttr = isActionable(item) ? '' : 'disabled';
        const priorityClass = item.agingState ? ` ${item.agingState}` : '';
        return `
          <tr>
            <td class="text-center"><input class="table-checkbox row-checkbox" type="checkbox" aria-label="选择 ${escapeHtml(item.id)}" data-id="${escapeHtml(item.id)}" ${item.selected && isActionable(item) ? 'checked' : ''} ${disabledAttr} /></td>
            <td>
              <div class="record-main">${escapeHtml(item.id)}</div>
              <div class="record-sub">${escapeHtml(item.department)}</div>
            </td>
            <td>
              <div class="record-main">${escapeHtml(item.applicant)}</div>
              <div class="record-sub">${escapeHtml(item.type)} 报销</div>
            </td>
            <td>
              <div class="expense-main">${escapeHtml(item.purpose)}</div>
              <div class="expense-sub">${escapeHtml(item.note)}</div>
            </td>
            <td>
              <div class="record-main">${escapeHtml(item.submittedAt)}</div>
              <div class="record-sub">提交至当前节点</div>
            </td>
            <td class="text-right">
              <div class="record-main">¥ ${item.amount.toLocaleString('zh-CN')}</div>
              <div class="record-sub">含税报销金额</div>
            </td>
            <td>
              <div class="aging-main">${escapeHtml(item.agingLabel)}</div>
              <div class="aging-sub"><span class="priority-badge${priorityClass}">${escapeHtml(item.priority)}</span></div>
            </td>
            <td>
              <div class="status-stack">
                <span class="status-tag ${getStatusClass(item.status)}">${escapeHtml(item.status)}</span>
                <span class="status-note">${isActionable(item) ? '可直接执行审批动作' : '当前状态已处理完成'}</span>
              </div>
            </td>
            <td>
              <div class="approval-actions">
                <button class="btn btn-primary row-approve" type="button" data-id="${escapeHtml(item.id)}" ${disabledAttr}>通过</button>
                <button class="btn btn-secondary row-reject" type="button" data-id="${escapeHtml(item.id)}" ${disabledAttr}>退回</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      renderPagination(filtered.length);
      updateSelectionState();
    }

    function renderPagination(totalItems) {
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      const start = totalItems === 0 ? 0 : (currentPage - 1) * pageSize + 1;
      const end = Math.min(currentPage * pageSize, totalItems);
      paginationInfo.textContent = `共 ${totalItems} 条，当前显示 ${start}-${end} 条`;
      const buttons = [];
      buttons.push(`<button class="page-btn" type="button" data-page="prev" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`);
      for (let page = 1; page <= totalPages; page += 1) {
        buttons.push(`<button class="page-btn${page === currentPage ? ' is-active' : ''}" type="button" data-page="${page}">${page}</button>`);
      }
      buttons.push(`<button class="page-btn" type="button" data-page="next" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`);
      paginationActions.innerHTML = buttons.join('');
    }

    function applyFilters() {
      filters.keyword = keywordInput.value;
      filters.status = statusSelect.value;
      filters.type = typeSelect.value;
      filters.priority = prioritySelect.value;
      currentPage = 1;
      renderRows();
    }

    function resetFilters() {
      keywordInput.value = '';
      statusSelect.value = 'all';
      typeSelect.value = 'all';
      prioritySelect.value = 'all';
      filters.keyword = '';
      filters.status = 'all';
      filters.type = 'all';
      filters.priority = 'all';
      approvalData.forEach((item) => { item.selected = false; });
      currentPage = 1;
      renderRows();
    }

    function updateRecord(id, nextStatus) {
      const target = approvalData.find((item) => item.id === id);
      if (!target || !isActionable(target)) return;
      target.status = nextStatus;
      target.selected = false;
      target.note = nextStatus === '已通过' ? '已完成审批，等待财务出纳处理' : '已退回申请人补充说明或调整附件';
      target.agingLabel = nextStatus === '已通过' ? '已完成' : '已退回';
      target.agingState = '';
      renderRows();
    }

    function batchUpdate(nextStatus) {
      const targets = approvalData.filter((item) => item.selected && isActionable(item));
      if (targets.length === 0) return;
      targets.forEach((item) => {
        item.status = nextStatus;
        item.selected = false;
        item.note = nextStatus === '已通过' ? '已完成批量审批，等待后续流转' : '已批量退回申请人补充资料';
        item.agingLabel = nextStatus === '已通过' ? '已完成' : '已退回';
        item.agingState = '';
      });
      renderRows();
    }

    document.getElementById('queryBtn').addEventListener('click', applyFilters);
    document.getElementById('resetBtn').addEventListener('click', resetFilters);
    openRuleBtn.addEventListener('click', () => {
      toolbarInfo.innerHTML = '<span class="quick-rule-panel"><span class="quick-rule-chip">超预算单据先看风险说明</span><span class="quick-rule-chip">附件完整可优先批量通过</span><span class="quick-rule-chip">招待类超限建议先退回补充</span></span>';
    });

    selectAll.addEventListener('change', (event) => {
      const pageItems = getPageItems(getFilteredData());
      pageItems.forEach((item) => {
        if (isActionable(item)) item.selected = event.target.checked;
      });
      renderRows();
    });

    tableBody.addEventListener('change', (event) => {
      const checkbox = event.target.closest('.row-checkbox');
      if (!checkbox) return;
      const target = approvalData.find((item) => item.id === checkbox.dataset.id);
      if (!target || !isActionable(target)) return;
      target.selected = checkbox.checked;
      updateSelectionState();
      renderToolbarInfo(getFilteredData());
    });

    tableBody.addEventListener('click', (event) => {
      const approveBtn = event.target.closest('.row-approve');
      const rejectBtn = event.target.closest('.row-reject');
      if (approveBtn) updateRecord(approveBtn.dataset.id, '已通过');
      if (rejectBtn) updateRecord(rejectBtn.dataset.id, '已退回');
    });

    batchApproveBtn.addEventListener('click', () => batchUpdate('已通过'));
    headerBatchApproveBtn.addEventListener('click', () => batchUpdate('已通过'));
    batchRejectBtn.addEventListener('click', () => batchUpdate('已退回'));

    paginationActions.addEventListener('click', (event) => {
      const btn = event.target.closest('.page-btn');
      if (!btn || btn.disabled) return;
      const filteredLength = getFilteredData().length;
      const totalPages = Math.max(1, Math.ceil(filteredLength / pageSize));
      if (btn.dataset.page === 'prev') currentPage = Math.max(1, currentPage - 1);
      else if (btn.dataset.page === 'next') currentPage = Math.min(totalPages, currentPage + 1);
      else currentPage = Number(btn.dataset.page);
      renderRows();
    });

    keywordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') applyFilters();
    });

    renderRows();
  </script>
</body>
</html>
