<style>
/* ══ 2. Shell CSS (admin-side-shell 原文) ══ */
:root {
  --color-nav-gradient-start: #3C8AFF;
  --color-nav-gradient-end: #4255FF;
  --color-nav-text: #FFFFFF;
  --top-nav-height: 48px;
  --top-brand-width: 160px;
  --side-nav-width: 188px;
  --side-nav-item-width: 172px;
  --side-nav-item-height: 40px;
  --web-tabs-height: 32px;
  --web-tab-item-height: 32px;
  --page-padding: var(--spacing-4);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  color: var(--color-text-neutral-gray50);
  background: var(--color-layout-bg-neutral-gray);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  font-size: 14px;
  line-height: 22px;
}

button, input, select, textarea { font: inherit; }

.app-shell { min-height: 100vh; background: var(--color-layout-bg-neutral-gray); position: relative; }

.top-nav {
  height: var(--top-nav-height);
  display: flex;
  align-items: center;
  padding: 0;
  background: linear-gradient(117.84deg, var(--color-nav-gradient-start), var(--color-nav-gradient-end));
  position: sticky;
  top: 0;
  z-index: 20;
}

.nav-left { display: flex; align-items: center; flex: 1 1; padding-left: 14px; width: 0; min-width: 0; overflow: hidden; }
.nav-left-content { display: flex; align-items: center; flex: 0 0 auto; }
.nav-center { height: 100%; padding-right: 48px; flex: 0 0 auto; }
.nav-right { display: flex; align-items: center; flex-shrink: 0; height: 100%; padding-right: 12px; }
.nav-right-content { display: flex; align-items: center; }

.product-title {
  flex: 0 0 auto; padding: 0 16px 0 6px;
  color: rgba(249, 249, 250, 0.98); font-size: 22px; line-height: 26px;
  font-family: 'Alimama_ShuHeiTi_Bold', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-weight: 400; white-space: nowrap;
}

.nav-item-wrap { cursor: pointer; padding: 4px; border-radius: 6px; }
.nav-item-wrap:hover { background: rgba(249, 249, 250, 0.1); }
.nav-item-wrap.with-padding { padding: 4px 8px 4px 6px; }
.nav-item-wrap-search { padding: 0 4px; }
.nav-item-wrap-user { padding: 2px 8px; }

.enterprise-box { display: flex; align-items: center; }
.enterprise-icon { color: #fff; padding: 0 4px 0 2px; display: flex; align-items: center; }
.enterprise-name { color: rgba(249, 249, 250, 0.98); font-size: 14px; height: 22px; max-width: 222px; padding-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-caret { color: #fff; margin-left: 4px; display: flex; align-items: center; flex: 0 0 auto; }

.nav-app-wrap { display: flex; align-items: center; flex: 1 1; overflow: hidden; width: 0; }
.nav-divider-pseudo { background: rgba(255, 255, 255, 0.2); height: 18px; width: 1px; flex: 0 0 1px; margin-left: 8px; }
.xft-app-nav { display: flex; align-items: center; height: 48px; padding: 4px; }
.app-nav { display: flex; align-items: center; }

.nav-app {
  display: inline-flex; align-items: center; justify-content: center; flex-direction: column;
  color: rgba(255, 255, 255, 0.9); cursor: pointer; font-size: 14px; height: 40px;
  padding: 0 12px; position: relative; transition: all 0.15s ease;
  flex: 0 0 auto; white-space: nowrap; line-height: 22px;
}
.nav-app-content { display: flex; align-items: center; justify-content: center; }
.nav-app-active { background: #fff; height: 0; left: 0; margin: 0 12px; position: absolute; top: 38px; width: calc(100% - 24px); }
.nav-app.is-active { font-weight: 600; }
.nav-app.is-active .nav-app-active { height: 2px; }

.all-app-entry { display: flex; align-items: center; padding: 0 10px 0 8px; }
.all-app-container { display: flex; align-items: center; color: rgba(249, 249, 250, 0.98); font-size: 14px; gap: 4px; }
.all-app-icon { color: rgba(249, 249, 250, 0.98); width: 24px; height: 24px; flex: 0 0 24px; }

.global-search { width: 240px; height: 32px; display: inline-flex; align-items: center; gap: 6px; padding: 0 8px; border-radius: 6px; background: rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.5); border: none; flex: 0 0 auto; }
.global-search:hover { background: rgba(255, 255, 255, 0.4); }
.global-search svg { width: 16px; height: 16px; flex: 0 0 16px; }

.nav-tool { cursor: pointer; padding: 4px; border-radius: 6px; }
.nav-tool:hover { background: rgba(249, 249, 250, 0.1); }
.top-nav-icon { width: 24px; height: 24px; color: rgba(249, 249, 250, 0.98); display: block; }
.nav-divider-vertical { background: rgba(249, 249, 250, 0.14); border-radius: 1px; height: 16px; width: 1px; flex: 0 0 1px; margin: 0 4px; }

.user-avatar-wrap { display: flex; align-items: center; cursor: pointer; }
.user-logo-box { border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%; height: 28px; width: 28px; position: relative; overflow: hidden; flex: 0 0 28px; }
.user-logo { width: 100%; height: 100%; border-radius: 50%; background: #1966ff; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; }
.user-name { color: rgba(249, 249, 250, 0.98); font-size: 14px; line-height: 24px; margin: 0 4px 0 8px; max-width: 112px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.top-menu-icon { width: 16px; height: 16px; flex: 0 0 16px; color: currentColor; }
.top-menu-overflow { display: none; width: 24px; height: 24px; align-items: center; justify-content: center; color: rgba(255, 255, 255, 0.88); flex: 0 0 24px; cursor: pointer; }

.main-frame { display: flex; min-height: calc(100vh - var(--top-nav-height)); background: #ffffff; }

.side-nav { width: var(--side-nav-width); flex: 0 0 var(--side-nav-width); background: var(--color-container-bg-neutral-bright); border-right: 1px solid var(--color-divider-neutral); padding: 8px 2px 0 8px; overflow-y: auto; overflow-x: hidden; }
/* 工作台首页：无侧边栏 */
.side-nav { display: none; }

.side-nav-group-title, .side-nav-item { width: 100%; height: var(--side-nav-item-height); display: flex; align-items: center; padding: 8px 4px 8px 8px; border-radius: 6px; color: rgba(19, 34, 64, 0.95); cursor: pointer; font-size: 14px; font-weight: 400; line-height: 24px; margin-bottom: 8px; transition: background 0.15s ease; }
.side-nav-group-title:hover, .side-nav-item:not(.is-active):hover { background: #f3f4f6; }
.side-nav-group-title.is-selected { color: #1966ff; }
.side-nav-item.is-active { color: #1966ff; background: #ebf3ff; font-weight: 500; }
.side-nav-item.level-2 { padding: 0 4px 0 36px; line-height: var(--side-nav-item-height); }
.nav-icon { width: 24px; height: 24px; flex: 0 0 24px; color: rgba(19, 34, 64, 0.65); margin-right: 4px; }
.nav-label { min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 4px; }
.nav-arrow { width: 16px; height: 16px; color: rgba(19, 34, 64, 0.65); flex: 0 0 16px; margin: 0 4px 0 0; transition: transform 0.2s ease; }
.nav-arrow.contract { transform: rotate(-180deg); }
.nav-badge { display: inline-flex; align-items: center; height: 18px; padding: 0 6px; border-radius: 999px; background: #fff1e8; color: #f97316; font-size: 12px; line-height: 18px; white-space: nowrap; }

.work-area { flex: 1; min-width: 0; display: flex; flex-direction: column; background: #ffffff; }

.page-content { flex: 1; min-width: 0; overflow: auto; background: #f3f4f6; }
.micro-wrapper { min-height: 100%; padding: 16px 0; background: #f3f4f6; }
.page-content-container { min-height: calc(100vh - var(--top-nav-height) - 32px); margin: 0 16px; padding: 16px; background: #ffffff; border-radius: 14px; }
</style>
<style>
/* ══ 3. HomePage 3-Column Grid (场景一：工作台首页，无 Sidebar) ══ */
/* content_width = clamp(1248px, W - 32px, 1580px) */

.home-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--spacing-4);
  width: calc(100% - 32px);
  min-width: 1248px;
  max-width: 1580px;
  margin: 0 var(--spacing-4);
}

.home-grid .card {
  background: var(--color-container-bg-neutral-bright);
  border-radius: var(--border-radius-large);
  box-shadow: var(--shadow-special3-bottom);
  padding: var(--spacing-4) var(--spacing-5);
  min-height: 160px;
}

.home-grid .card.span-1 { grid-column: span 1; }
.home-grid .card.span-2 { grid-column: span 2; }
.home-grid .card.span-3 { grid-column: span 3; }
</style>
</head>
