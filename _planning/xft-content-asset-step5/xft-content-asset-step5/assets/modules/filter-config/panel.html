<section class="module-card" data-module="filter-config-panel">
  <div class="module-header">
    <div class="module-title">筛选项配置</div>
    <div class="module-actions"><button class="btn btn-secondary" type="button">恢复默认</button><button class="btn btn-primary" type="button">保存配置</button></div>
  </div>
  <div class="module-body config-panel">
    <div class="config-list">
      <div class="config-list-item is-active"><span>常用筛选</span><span class="status-tag status-info">显示</span></div>
      <div class="config-list-item"><span>高级筛选</span><span class="status-tag status-neutral">收起</span></div>
      <div class="config-list-item"><span>隐藏字段</span><span class="status-tag status-neutral">未启用</span></div>
    </div>
    <div class="config-detail">
      <div class="module-title">选择默认展示字段</div>
      <div class="config-check-list">
        <label class="checkbox"><input class="checkbox-input" type="checkbox" checked><span class="checkbox-label">组织</span></label>
        <label class="checkbox"><input class="checkbox-input" type="checkbox" checked><span class="checkbox-label">状态</span></label>
        <label class="checkbox"><input class="checkbox-input" type="checkbox"><span class="checkbox-label">创建时间</span></label>
      </div>
    </div>
  </div>
</section>
