<div class="xft-overlay-root" data-asset="overlay.modal.confirm">
  <div class="xft-overlay-mask"></div>
  <div class="xft-overlay-center">
    <section class="xft-confirm-panel" role="alertdialog" aria-modal="true">
      <div class="xft-modal-body">
        <h2 class="xft-overlay-title">确认执行该操作？</h2>
        <p class="xft-overlay-description">该操作可能影响已有数据，请确认后继续。</p>
      </div>
      <footer class="xft-modal-footer">
        <button class="btn btn-secondary" type="button">取消</button>
        <button class="btn btn-danger" type="button">确认</button>
      </footer>
    </section>
  </div>
</div>
