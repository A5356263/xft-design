<!-- region.table-region.with-selection-summary | sources: M006,M058,M089,M090 -->
<section data-xft-region="data-table" data-xft-variant="with-selection-summary">
  <div class="table-selection-summary">
    <span>已选择 <strong>3</strong> 项</span>
    <div class="table-selection-actions">
      <button class="btn btn-secondary" type="button">批量导出</button>
      <button class="btn btn-danger" type="button">批量删除</button>
    </div>
  </div>
  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th><label class="checkbox"><input class="checkbox-input" type="checkbox" /><span class="checkbox-label"></span></label></th>
          <th>字段一</th>
          <th>字段二</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><label class="checkbox"><input class="checkbox-input" type="checkbox" checked /><span class="checkbox-label"></span></label></td>
          <td>内容</td>
          <td>内容</td>
          <td><span class="status-tag status-success">已生效</span></td>
          <td><span class="table-action">查看</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
